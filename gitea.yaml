services:
  server:
    image: docker.gitea.com/gitea:1.25.5-rootless
    restart: always
    volumes:
      - /srv/gitea/data:/var/lib/gitea
      - /srv/gitea/config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3333:3000"
      - "2222:2222"
