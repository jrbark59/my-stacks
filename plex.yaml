services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=America/New_York
      - VERSION=docker
      - PLEX_CLAIM=claim-xHprzwi7jkjBmtsYpJs6
      - PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_SHARES=Plex Media Server
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    runtime: nvidia
    ports:
      - target: 32400
        published: 32400
        protocol: tcp
      - target: 19093
        published: 19093
        protocol: tcp
    volumes:
      - type: bind
        source: /mnt/STORAGE_24TB/appdata/plex
        target: /config
      - type: bind
        source: /mnt/STORAGE_24TB/appdata/plex/transcoding-temp
        target: /tmp
      - type: bind
        source: /mnt/STORAGE_44TB/Media/TV Shows
        target: /tvshows
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Movies
        target: /movies
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Music
        target: /music
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Pictures
        target: /pictures
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Video
        target: /videos
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Recordings
        target: /recordings
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Downloads
        target: /downloads
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Uploads
        target: /uploads
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Music Videos
        target: /musicvideos
      - type: bind
        source: /mnt/STORAGE_44TB/Media/Classic Cartoons
        target: /classiccartoons
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
