volumes:
  music:
  config:
  
services:
  navidrome:
    image: navidrome/navidrome
    container_name: navidrome
    restart: unless-stopped
    volumes:
      - "music:/music"
      - "config:/data"
    ports:
      - 4533:4533
    environment:
      - ND_LOG_LEVEL=info
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.keaton == true
      restart_policy:
        condition: on-failure
      
